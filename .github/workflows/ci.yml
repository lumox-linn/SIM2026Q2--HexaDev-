name: CI/CD — Fundraising System
 
on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
 
jobs:
 
  # ── Backend tests ──────────────────────────────────────────
  backend-tests:
    name: Backend (pytest)
    runs-on: ubuntu-latest
 
    services:
      mysql:
        image: mysql:8.0
        env:
          MYSQL_ROOT_PASSWORD: root
          MYSQL_DATABASE: csit314
        ports:
          - 3306:3306
        options: >-
          --health-cmd="mysqladmin ping"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=5
 
    steps:
      - name: Checkout code
        uses: actions/checkout@v4.2.2
 
      - name: Set up Python
        uses: actions/setup-python@v5.6.0
        with:
          python-version: '3.11'
 
      - name: Install dependencies
        working-directory: backend
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
 
      - name: Run migrations
        working-directory: backend
        run: |
          mysql -h 127.0.0.1 -u root -proot csit314 < migrations/001_create_tables.sql
 
      - name: Run tests
        working-directory: backend
        env:
          FLASK_ENV: testing
          SECRET_KEY: test-secret
          MYSQL_HOST: 127.0.0.1
          MYSQL_USER: root
          MYSQL_PASSWORD: root
          MYSQL_DB: csit314
        run: |
          pytest tests/ -v --tb=short